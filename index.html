<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Trade Capital</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Segoe UI,Arial;
background:radial-gradient(circle at 30% 20%,#0a1f44,#020817 70%);
color:#fff;
}

#navbar{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 60px;
background:rgba(4,12,31,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(0,255,255,0.15);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:600;
background:linear-gradient(90deg,#00f0ff,#00aaff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.container{
max-width:1200px;
margin:120px auto 100px auto;
padding:0 40px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,255,0.1);
border-radius:18px;
padding:40px;
margin-bottom:50px;
backdrop-filter:blur(14px);
box-shadow:0 20px 40px rgba(0,0,0,.5);
}

h2{
margin-bottom:25px;
font-weight:500;
color:#00eaff;
font-size:26px;
}

.partner-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:35px;
align-items:center;
justify-items:center;
}

.partner-grid img{
max-height:55px;
filter:brightness(1.2) drop-shadow(0 0 10px rgba(0,255,255,.3));
transition:.3s;
}

.partner-grid img:hover{
transform:scale(1.12);
filter:brightness(1.5) drop-shadow(0 0 20px rgba(0,255,255,.7));
}

.open-account{
margin-top:30px;
text-align:center;
font-size:18px;
line-height:1.6;
}

.open-account a{
color:#00f0ff;
text-decoration:none;
font-weight:600;
}

.open-account a:hover{
text-decoration:underline;
}

</style>
</head>
<body>

<div id="navbar">
<div class="logo">GLOBAL TRADE CAPITAL</div>
</div>

<div class="container">

<div class="card">
<h2>Libyan Banking Partners</h2>

<div class="partner-grid">
<img src="https://seeklogo.com/images/N/national-commercial-bank-libya-logo-vector-logo-630720.svg" alt="NCB">
<img src="https://static.cdnlogo.com/logos/j/32/jumhouria-bank.svg" alt="Jumhouria Bank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Flag_of_Libya.svg" alt="Sahara Bank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Flag_of_Libya.svg" alt="Bank of Commerce and Development">
</div>
</div>

<div class="card">
<h2>Libyan Bank Cards & International Payment Cards Accepted</h2>

<div class="partner-grid">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg">
</div>

<div class="open-account">
Open an account with one of our partner banks and fund your trading account securely.<br><br>
<a href="#">Click here to Open Your Account</a>
</div>

</div>

<div class="card">
<h2>Contact Us</h2>

<div class="partner-grid">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png" alt="Facebook">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</div>

</div>

</div>

</body>
</html>

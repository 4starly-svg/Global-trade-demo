<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Trade Capital</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(-45deg,#0b1220,#0e1a2b,#0c1a33,#101c2f);
    background-size:400% 400%;
    animation:gradientMove 25s ease infinite;
    color:#fff;
    min-height:100vh;
    overflow-x:hidden;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{
    font-size:20px;
    font-weight:700;
    letter-spacing:1px;
}

.toggle{
    cursor:pointer;
    padding:6px 14px;
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    font-size:14px;
}

.portfolio{
    padding:30px 40px;
}

.balance{
    font-size:34px;
    font-weight:700;
}

.pnl{
    margin-top:6px;
    font-size:16px;
    color:#27d17f;
}

.grid{
    padding:20px 40px 60px 40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:20px;
    transition:0.25s ease;
    cursor:pointer;
}

.card:hover{
    box-shadow:0 0 25px rgba(0,120,255,0.4);
    transform:translateY(-3px);
}

.symbol{
    font-weight:600;
    font-size:16px;
}

.price{
    margin-top:8px;
    font-size:22px;
    font-weight:700;
}

.change{
    margin-top:4px;
    font-size:14px;
}

.green{color:#27d17f;}
.red{color:#ff4d4d;}

.trade-panel{
    position:fixed;
    right:-400px;
    top:0;
    width:380px;
    height:100%;
    background:#0d1726;
    padding:30px;
    transition:0.4s ease;
    box-shadow:-5px 0 25px rgba(0,0,0,0.5);
}

.trade-panel.active{
    right:0;
}

.trade-panel h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    background:#111c2e;
    border:none;
    border-radius:8px;
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:8px;
    font-weight:600;
    cursor:pointer;
}

.buy{background:#1e88ff;color:white;}
.sell{background:#ff4d4d;color:white;}

.close{
    position:absolute;
    top:15px;
    right:20px;
    cursor:pointer;
    font-size:20px;
}

body.rtl{
    direction:rtl;
    font-family:'Cairo',sans-serif;
}
</style>
</head>
<body>

<header>
<div class="logo">Global Trade Capital</div>
<div class="toggle" onclick="toggleLang()">AR</div>
</header>

<section class="portfolio">
<div class="balance">$124,892.42</div>
<div class="pnl">+ $1,245.22 Today</div>
</section>

<section class="grid" id="assetGrid"></section>

<div class="trade-panel" id="tradePanel">
<div class="close" onclick="closePanel()">✕</div>
<h2 id="tradeSymbol">Trade</h2>
<input type="number" placeholder="Quantity">
<button class="buy">Buy</button>
<button class="sell">Sell</button>
</div>

<script>
const assets = [
{symbol:"AAPL",price:187.32},
{symbol:"MSFT",price:402.11},
{symbol:"TSLA",price:211.45},
{symbol:"NVDA",price:721.88},
{symbol:"AMZN",price:172.22},
{symbol:"META",price:498.55},
{symbol:"BTC",price:63250.44},
{symbol:"ETH",price:3455.77},
{symbol:"SOL",price:142.66},
{symbol:"BNB",price:389.12},
{symbol:"EUR/USD",price:1.0821},
{symbol:"USD/JPY",price:150.33}
];

const grid=document.getElementById("assetGrid");

assets.forEach(asset=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
        <div class="symbol">${asset.symbol}</div>
        <div class="price" id="price-${asset.symbol}">${asset.price}</div>
        <div class="change" id="change-${asset.symbol}">0.00%</div>
    `;
    card.onclick=()=>openTrade(asset.symbol);
    grid.appendChild(card);

    simulate(asset);
});

function simulate(asset){
    setInterval(()=>{
        let change=(Math.random()-0.5)*0.8;
        asset.price+=change;
        let percent=((change/asset.price)*100).toFixed(2);
        document.getElementById(`price-${asset.symbol}`).innerText=asset.price.toFixed(2);
        let changeEl=document.getElementById(`change-${asset.symbol}`);
        changeEl.innerText=(percent>0?"+":"")+percent+"%";
        changeEl.className="change "+(percent>=0?"green":"red");
    },2000+Math.random()*4000);
}

function openTrade(symbol){
    document.getElementById("tradePanel").classList.add("active");
    document.getElementById("tradeSymbol").innerText="Trade "+symbol;
}

function closePanel(){
    document.getElementById("tradePanel").classList.remove("active");
}

function toggleLang(){
    document.body.classList.toggle("rtl");
}
</script>

</body>
</html>

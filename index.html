<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Global Trade Capital</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:radial-gradient(circle at 20% 20%,#0f2b5b,#040c1f);
color:#fff;
}

/* NAVBAR */
#navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:linear-gradient(90deg,#071a3a,#0f2b5b);
box-shadow:0 0 20px rgba(0,255,255,.2);
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
background:linear-gradient(45deg,#00f5ff,#00c3ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav-links{
display:flex;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

.nav-links button{
background:#0b2247;
border:none;
color:#fff;
padding:8px 14px;
border-radius:6px;
transition:.3s;
}

.nav-links button:hover{
background:#00e0ff;
color:#00152d;
box-shadow:0 0 12px #00e0ff;
}

#langSwitch{
background:#00e0ff;
color:#00152d;
font-weight:bold;
}

/* PAGE */
.page{
display:none;
padding:120px 40px 60px 40px;
}

h2{
color:#00f5ff;
margin-bottom:10px;
}

/* TABLES */
table{
width:100%;
border-collapse:collapse;
background:rgba(0,0,0,.3);
border-radius:8px;
overflow:hidden;
}

th,td{
padding:10px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

tr:hover{
background:rgba(0,255,255,.1);
cursor:pointer;
}

.positive{color:#00ff88;font-weight:bold;}
.negative{color:#ff4d4d;font-weight:bold;}

/* LOGOS */
.partner-logos{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:25px;
margin-top:20px;
}

.partner-logos img{
height:45px;
filter:drop-shadow(0 0 6px rgba(0,255,255,.4));
transition:.3s;
}

.partner-logos img:hover{
transform:scale(1.1);
}

/* TICKERS */
#topTicker,#bottomTicker{
position:fixed;
width:100%;
padding:8px 20px;
background:#071a3a;
color:#00f5ff;
font-weight:bold;
white-space:nowrap;
overflow:hidden;
}

#topTicker{top:60px;}
#bottomTicker{bottom:0;}

</style>
</head>

<body>

<div id="navbar">
<div class="logo">GLOBAL TRADE CAPITAL</div>
<div class="nav-links">
<button onclick="openPage('dashboard')">Dashboard</button>
<button onclick="openPage('stocks')">Stocks</button>
<button onclick="openPage('learn')">Learn</button>
<button id="langSwitch" onclick="toggleLanguage()">Language: عربي</button>
</div>
</div>

<div id="topTicker"></div>
<div id="bottomTicker"></div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2 id="dashTitle">Trading Dashboard</h2>
<p id="dashText">Welcome to your AI-powered trading platform.</p>
</div>

<!-- STOCKS -->
<div id="stocks" class="page">
<h2>Stocks</h2>
<table>
<thead><tr><th>Symbol</th><th>Price</th><th>Change</th></tr></thead>
<tbody id="stockTable"></tbody>
</table>
</div>

<!-- LEARN -->
<div id="learn" class="page">
<h2 id="learnTitle">Our Banking Partners</h2>

<div class="partner-logos">
<!-- National Commercial Bank -->
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Libya_Coat_of_Arms.svg" alt="National Commercial Bank">

<!-- Sahara Bank -->
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Flag_of_Libya.svg" alt="Sahara Bank">

<!-- Al Jumhouria Bank -->
<img src="https://static.cdnlogo.com/logos/j/32/jumhouria-bank.svg" alt="Al Jumhouria Bank">
</div>

<h2 style="margin-top:40px;">Payment Methods</h2>
<div class="partner-logos">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg">
</div>

<h2 style="margin-top:40px;">Contact Us</h2>
<div class="partner-logos">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_%282019%29.png">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</div>

</div>

<script>
let language="en";
let stocks=[
{symbol:"AAPL",price:178.5,change:1.2},
{symbol:"TSLA",price:251.3,change:-0.7},
{symbol:"AMZN",price:3450.8,change:2.4}
];

function openPage(p){
document.querySelectorAll(".page").forEach(el=>el.style.display="none");
document.getElementById(p).style.display="block";
}

function populateStocks(){
let t=document.getElementById("stockTable");
t.innerHTML="";
stocks.forEach(s=>{
let r=t.insertRow();
r.insertCell(0).innerText=s.symbol;
r.insertCell(1).innerText="$"+s.price;
let c=r.insertCell(2);
c.innerText=(s.change>=0?"+":"")+s.change+"%";
c.className=s.change>=0?"positive":"negative";
});
}

function toggleLanguage(){
language=language==="en"?"ar":"en";
if(language==="ar"){
document.getElementById("dashTitle").innerText="لوحة التداول";
document.getElementById("dashText").innerText="مرحبًا بك في منصة التداول الذكية.";
document.getElementById("learnTitle").innerText="شركاؤنا المصرفيون";
document.getElementById("langSwitch").innerText="Language: English";
}else{
document.getElementById("dashTitle").innerText="Trading Dashboard";
document.getElementById("dashText").innerText="Welcome to your AI-powered trading platform.";
document.getElementById("learnTitle").innerText="Our Banking Partners";
document.getElementById("langSwitch").innerText="Language: عربي";
}
}

function startTickers(){
let t=document.getElementById("topTicker");
let b=document.getElementById("bottomTicker");
let i=0;
setInterval(()=>{
t.innerText=stocks[i%stocks.length].symbol+" $"+stocks[i%stocks.length].price;
b.innerText="AI Signals Active | Secure Banking | Global Access";
i++;
},2000);
}

openPage("dashboard");
populateStocks();
startTickers();
</script>

</body>
</html>

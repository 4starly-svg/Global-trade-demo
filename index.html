<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Global Trade Capital</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
h2{color:#22c55e}
button{cursor:pointer}

/* Dashboard */
#dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:30px;padding:60px}
.card{
background:rgba(34,197,94,0.2);
padding:60px;
text-align:center;
border-radius:20px;
font-size:22px;
font-weight:bold;
transition:0.3s;
box-shadow:0 0 15px rgba(34,197,94,0.3)
}
.card:hover{
transform:scale(1.1);
box-shadow:0 0 35px #22c55e
}

/* Pages */
.page{display:none;padding:50px}
.item{
background:#111;
padding:20px;
margin:15px 0;
border-radius:12px;
transition:0.3s;
}
.item:hover{
box-shadow:0 0 15px #22c55e;
transform:translateX(10px)
}

.back{background:#22c55e;color:black;padding:10px 15px;border:none;border-radius:8px;margin-bottom:20px}

/* Stock Detail */
#stock-detail img{width:120px;margin-bottom:20px}
.action-btn{
padding:10px 20px;
border:none;
border-radius:6px;
margin-right:10px;
font-weight:bold
}
.buy{background:#22c55e;color:black}
.sell{background:#ef4444;color:white}
.save{background:#3b82f6;color:white}

</style>
</head>
<body>

<!-- DASHBOARD -->
<div id="dashboard">
<div class="card" onclick="openPage('stocks-main')">Stocks</div>
<div class="card" onclick="alert('Crypto Coming Next Upgrade')">Crypto</div>
<div class="card" onclick="alert('FX Coming Next Upgrade')">FX</div>
<div class="card" onclick="alert('Learn Page Coming Next Upgrade')">Learn How To Trade</div>
</div>

<!-- STOCKS MAIN -->
<div id="stocks-main" class="page">
<button class="back" onclick="goHome()">⬅ Back</button>
<h2>Stocks Categories</h2>

<div class="item" onclick="openPage('top-movers')">Top Market Movers</div>
<div class="item" onclick="openPage('weekly-lows')">This Week's Lows</div>
<div class="item" onclick="openPage('most-volume')">Most Volume</div>
<div class="item" onclick="openPage('analyst-picks')">Analyst Picks</div>
<div class="item" onclick="openPage('trade-engine')">Stock Trade Engine</div>
</div>

<!-- CATEGORY: TOP MOVERS -->
<div id="top-movers" class="page">
<button class="back" onclick="openPage('stocks-main')">⬅ Back</button>
<h2>Top Market Movers</h2>

<div class="item" onclick="openStock('Apple','apple.png')">Apple</div>
<div class="item" onclick="openStock('Tesla','tesla.png')">Tesla</div>
<div class="item" onclick="openStock('Amazon','amazon.png')">Amazon</div>
<div class="item" onclick="openStock('Microsoft','microsoft.png')">Microsoft</div>
<div class="item" onclick="openStock('Nvidia','nvidia.png')">Nvidia</div>
</div>

<!-- STOCK DETAIL -->
<div id="stock-detail" class="page">
<button class="back" onclick="history.back()">⬅ Back</button>
<h2 id="stock-name"></h2>
<img id="stock-logo" src="">
<p>Market Cap: $<span id="marketcap"></span></p>
<p>52 Week High: $<span id="high"></span></p>
<p>52 Week Low: $<span id="low"></span></p>
<p>Volume: <span id="volume"></span></p>
<p>Analyst Rating: <span id="rating"></span></p>

<br>
<button class="action-btn buy">Buy</button>
<button class="action-btn sell">Sell</button>
<button class="action-btn save">Save Trade</button>
</div>

<script>

/* Navigation */
function openPage(id){
document.querySelectorAll('.page').forEach(p=>p.style.display='none');
document.getElementById('dashboard').style.display='none';
document.getElementById(id).style.display='block';
}

function goHome(){
document.querySelectorAll('.page').forEach(p=>p.style.display='none');
document.getElementById('dashboard').style.display='grid';
}

/* Open Stock Detail */
function openStock(name,logo){
openPage('stock-detail');
document.getElementById('stock-name').innerText=name;
document.getElementById('stock-logo').src="logos/"+logo;

document.getElementById('marketcap').innerText=(Math.random()*1000000).toFixed(0);
document.getElementById('high').innerText=(Math.random()*1000).toFixed(2);
document.getElementById('low').innerText=(Math.random()*500).toFixed(2);
document.getElementById('volume').innerText=(Math.random()*1000000).toFixed(0);
document.getElementById('rating').innerText=['Buy','Hold','Sell'][Math.floor(Math.random()*3)];
}

</script>

</body>
</html>

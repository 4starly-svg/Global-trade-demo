<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Trade Capital</title>

<style>

/* ===============================
   GLOBAL STYLE – INSTITUTIONAL
================================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

body {
  background: #0f1115; /* Charcoal Institutional Base */
  color: #e5e7eb;
}

/* ===============================
   TOP NAVIGATION BAR
================================= */

.topbar {
  height: 70px;
  background: #141821;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  border-bottom: 1px solid #1f2937;
}

.logo {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 1px;
}

.market-status {
  font-size: 14px;
  color: #22c55e;
}

.account-info {
  display: flex;
  gap: 30px;
  align-items: center;
  font-size: 14px;
}

.balance {
  font-weight: 600;
}

.lang-toggle {
  cursor: pointer;
  opacity: 0.7;
}

.lang-toggle:hover {
  opacity: 1;
}

/* ===============================
   MAIN DASHBOARD
================================= */

.dashboard {
  padding: 40px;
}

.section-title {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #9ca3af;
  margin-bottom: 15px;
}

/* ===============================
   ASSET GRID
================================= */

.asset-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
  margin-bottom: 50px;
}

.asset-card {
  background: #161b24;
  border: 1px solid #1f2937;
  border-radius: 8px;
  padding: 18px;
  transition: 0.2s ease;
  cursor: pointer;
}

.asset-card:hover {
  background: #1c2230;
  border-color: #374151;
  transform: translateY(-2px);
}

.asset-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
}

.symbol {
  font-weight: 600;
  font-size: 15px;
}

.price {
  font-size: 15px;
}

.change {
  font-size: 13px;
  margin-top: 6px;
}

.positive {
  color: #22c55e;
}

.negative {
  color: #ef4444;
}

.volume {
  font-size: 11px;
  color: #6b7280;
  margin-top: 8px;
}

/* ===============================
   MODAL (CHART VIEW ON CLICK)
================================= */

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-content {
  background: #141821;
  width: 900px;
  height: 500px;
  border-radius: 10px;
  padding: 30px;
  display: flex;
  gap: 30px;
}

.chart-area {
  flex: 2;
  background: #0f1115;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #6b7280;
}

.trade-panel {
  flex: 1;
  background: #161b24;
  border-radius: 8px;
  padding: 20px;
}

.trade-panel h3 {
  margin-bottom: 20px;
  font-size: 16px;
}

.trade-panel input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  background: #0f1115;
  border: 1px solid #374151;
  color: white;
  border-radius: 6px;
}

.trade-panel button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  margin-bottom: 10px;
  cursor: pointer;
  font-weight: 600;
}

.buy-btn {
  background: #22c55e;
  color: #0f1115;
}

.sell-btn {
  background: #ef4444;
  color: white;
}

.close-btn {
  background: #374151;
  color: white;
}

</style>
</head>

<body>

<!-- ===============================
     TOP BAR
================================= -->

<div class="topbar">
  <div class="logo">Global Trade Capital</div>
  <div class="market-status">● Market Open</div>
  <div class="account-info">
    <div class="balance">Balance: $125,400.50</div>
    <div class="lang-toggle">EN / AR</div>
  </div>
</div>

<!-- ===============================
     DASHBOARD CONTENT
================================= -->

<div class="dashboard">

  <div class="section-title">Watchlist</div>
  <div class="asset-grid" id="assetGrid"></div>

</div>

<!-- ===============================
     MODAL VIEW
================================= -->

<div class="modal" id="assetModal">
  <div class="modal-content">
    <div class="chart-area">
      Chart Placeholder (Chart loads here after API integration)
    </div>
    <div class="trade-panel">
      <h3>Trade</h3>
      <input type="number" placeholder="Quantity">
      <button class="buy-btn">Buy</button>
      <button class="sell-btn">Sell</button>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>

/* ===============================
   MOCK DATA
================================= */

const assets = [
  { symbol: "AAPL", price: 189.32, change: 1.23, volume: "72M" },
  { symbol: "NVDA", price: 623.11, change: -0.84, volume: "38M" },
  { symbol: "TSLA", price: 242.19, change: 2.54, volume: "55M" },
  { symbol: "BTC", price: 67234.22, change: -1.12, volume: "29B" },
  { symbol: "ETH", price: 3211.87, change: 0.92, volume: "14B" },
  { symbol: "EUR/USD", price: 1.0845, change: 0.11, volume: "1.2T" }
];

const grid = document.getElementById("assetGrid");

assets.forEach(asset => {
  const card = document.createElement("div");
  card.className = "asset-card";
  card.innerHTML = `
    <div class="asset-header">
      <div class="symbol">${asset.symbol}</div>
      <div class="price">$${asset.price}</div>
    </div>
    <div class="change ${asset.change >= 0 ? "positive" : "negative"}">
      ${asset.change >= 0 ? "▲" : "▼"} ${asset.change}%
    </div>
    <div class="volume">Vol ${asset.volume}</div>
  `;
  card.onclick = () => openModal();
  grid.appendChild(card);
});

function openModal() {
  document.getElementById("assetModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("assetModal").style.display = "none";
}

</script>

</body>
</html>
